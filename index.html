<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>經典打磚塊遊戲 - 手機版</title>
    <style>
        body {
            background-color: #222;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden; /* 防止手機瀏覽器晃動 */
            touch-action: none; /* 禁用瀏覽器預設手勢 */
        }
        canvas {
            background: #000;
            border: 4px solid #fff;
            max-width: 95%;
            height: auto;
        }
        .info {
            margin-top: 10px;
            text-align: center;
        }
        /* 手機控制區 */
        .controls {
            display: flex;
            width: 100%;
            justify-content: space-around;
            margin-top: 20px;
            padding: 0 20px;
            box-sizing: border-box;
        }
        .btn {
            width: 80px;
            height: 80px;
            background-color: rgba(255, 255, 255, 0.2);
            border: 2px solid #fff;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        .btn:active {
            background-color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>

    <h1>打磚塊挑戰</h1>
    <canvas id="gameCanvas" width="480" height="320"></canvas>
    
    <div class="controls">
        <div id="btnLeft" class="btn">左</div>
        <div id="btnRight" class="btn">右</div>
    </div>

    <div class="info">
        <button onclick="document.location.reload()" style="padding: 10px 20px; cursor: pointer;">重新開始</button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        let score = 0;
        let ballRadius = 8;
        let x = canvas.width / 2;
        let y = canvas.height - 30;
        let dx = 3; // 稍微
